###############################################################################
# Radd — CI/CD Pipeline
#
# Triggers:
#   push → main          : full CI + build Docker images + push to GHCR + deploy
#   push → staging        : full CI + build + push (no deploy)
#   pull_request → main   : CI only (no build, no deploy)
#
# Required GitHub Secrets:
#   GHCR_TOKEN            Personal Access Token with packages:write scope
#   SSH_DEPLOY_KEY        Private SSH key for the production server
#   DEPLOY_HOST           Production server IP or hostname
#   DEPLOY_USER           SSH user on the production server
#   SLACK_WEBHOOK_URL     (optional) Slack notifications
###############################################################################

name: CI/CD

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/radd

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # JOB 1: Backend lint + type-check + tests
  # ─────────────────────────────────────────────────────────────────────────
  test-api:
    name: API — Lint, Typecheck, Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.24"
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run ruff check radd/ workers/ scripts/

      - name: Type-check (mypy)
        run: uv run mypy radd/ --ignore-missing-imports --no-error-summary
        continue-on-error: true   # mypy warnings shouldn't block CI for now

      - name: Unit tests (pytest)
        run: uv run pytest tests/ -v --tb=short --ignore=tests/test_pipeline.py
        env:
          # Minimal env for unit tests (no real DB/Redis needed)
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-ci-only
          OPENAI_API_KEY: sk-test
          WA_API_TOKEN: test
          WA_PHONE_NUMBER_ID: "123"
          WA_VERIFY_TOKEN: test
          WA_APP_SECRET: test

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 2: Frontend lint + type-check + build check
  # ─────────────────────────────────────────────────────────────────────────
  test-web:
    name: Web — Lint, Typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check (tsc)
        run: pnpm typecheck

      - name: Lint (eslint — if configured)
        run: pnpm lint --if-present
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 3: Build & push Docker images (only on push to main or staging)
  # ─────────────────────────────────────────────────────────────────────────
  build-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [test-api, test-web]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging')

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Compute image tag
        id: tag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-8)
          BRANCH=$(echo "${{ github.ref_name }}" | tr '/' '-')
          echo "tag=${BRANCH}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "latest_tag=$([ '${{ github.ref_name }}' = 'main' ] && echo 'latest' || echo 'staging')" >> $GITHUB_OUTPUT

      # ── API image ──────────────────────────────────────────────────────
      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infrastructure/docker/Dockerfile.api
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-api:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-api:${{ steps.tag.outputs.latest_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Worker image ───────────────────────────────────────────────────
      - name: Build & push Worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infrastructure/docker/Dockerfile.worker
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-worker:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-worker:${{ steps.tag.outputs.latest_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Web image ──────────────────────────────────────────────────────
      - name: Build & push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infrastructure/docker/Dockerfile.web
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.yourdomain.com
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-web:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-web:${{ steps.tag.outputs.latest_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output image tags
        run: |
          echo "✅ Images pushed:"
          echo "  API:    ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-api:${{ steps.tag.outputs.tag }}"
          echo "  Worker: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-worker:${{ steps.tag.outputs.tag }}"
          echo "  Web:    ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-web:${{ steps.tag.outputs.tag }}"

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 4: Deploy to production (only on push to main)
  # ─────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-push]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://yourdomain.com

    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_DEPLOY_KEY }}

      - name: Compute image tag
        id: tag
        run: echo "tag=main-$(echo '${{ github.sha }}' | cut -c1-8)" >> $GITHUB_OUTPUT

      - name: Deploy via SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          TAG: ${{ steps.tag.outputs.tag }}
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_PREFIX: ${{ env.IMAGE_PREFIX }}
        run: |
          ssh -o StrictHostKeyChecking=no "$DEPLOY_USER@$DEPLOY_HOST" bash << 'REMOTE_SCRIPT'
            set -e
            cd /opt/radd

            # Pull latest compose file
            git pull origin main

            # Export tag for docker-compose
            export TAG="${TAG}"
            export REGISTRY="${REGISTRY}"

            # Login to GHCR on server
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            # Pull new images
            docker compose -f infrastructure/docker-compose.prod.yml pull api worker kb_indexer web

            # Zero-downtime rolling restart (API first, then workers)
            docker compose -f infrastructure/docker-compose.prod.yml up -d --no-deps api
            sleep 15  # wait for API healthcheck

            docker compose -f infrastructure/docker-compose.prod.yml up -d --no-deps worker kb_indexer web

            # Run any pending DB migrations
            docker compose -f infrastructure/docker-compose.prod.yml exec -T api \
              alembic upgrade head

            # Cleanup old images
            docker image prune -f --filter "until=24h"

            echo "✅ Deployment complete — TAG=$TAG"
          REMOTE_SCRIPT

      - name: Notify Slack (success)
        if: success() && secrets.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "✅ *Radd* deployed successfully to production",
              "attachments": [{
                "color": "good",
                "fields": [
                  {"title": "Commit", "value": "${{ github.sha }}", "short": true},
                  {"title": "Author", "value": "${{ github.actor }}", "short": true}
                ]
              }]
            }

      - name: Notify Slack (failure)
        if: failure() && secrets.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "🚨 *Radd* production deployment FAILED",
              "attachments": [{
                "color": "danger",
                "fields": [
                  {"title": "Commit", "value": "${{ github.sha }}", "short": true},
                  {"title": "Author", "value": "${{ github.actor }}", "short": true},
                  {"title": "Run URL", "value": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}", "short": false}
                ]
              }]
            }
